<!DOCTYPE html>
<html>

<head>
    <title>Mini Product Search</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            margin-top: 60px;
        }

        .container {
            background: white;
            padding: 20px;
            width: 400px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #eee;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
        }

        .hidden {
            display: none;
        }

        #noResult {
            text-align: center;
            color: red;
        }
    </style>
</head>

<body>

    <div class="container">

        <h2>Product Search</h2>

        <input type="text" id="searchBox" placeholder="Search product...">

        <ul id="productList"></ul>

        <p id="noResult" class="hidden">No Results Found</p>

    </div>

    <script>

        //  state (product data)
        const products = [
            "Laptop",
            "Mobile",
            "Headphones",
            "Keyboard",
            "Mouse",
            "Smart Watch",
            "Camera"
        ];

        const searchBox = document.getElementById("searchBox");
        const productList = document.getElementById("productList");
        const noResult = document.getElementById("noResult");


        //  render products
        function renderProducts(list) {

            productList.innerHTML = "";

            list.forEach(product => {

                const li = document.createElement("li");
                li.textContent = product;
                productList.appendChild(li);

            });

            toggleNoResult(list.length);
        }


        //  show / hide no result message
        function toggleNoResult(count) {
            noResult.classList.toggle("hidden", count !== 0);
        }


        //  filter logic
        function filterProducts() {

            const searchText = searchBox.value.toLowerCase();

            const filtered = products.filter(product =>
                product.toLowerCase().includes(searchText)
            );

            renderProducts(filtered);
        }


        //  event delegation (for future product clicks if needed)
        productList.addEventListener("click", function (e) {
            if (e.target.tagName === "LI") {
                alert("You selected: " + e.target.textContent);
            }
        });


        //  input event for real-time search
        searchBox.addEventListener("input", filterProducts);


        // initial load
        renderProducts(products);

    </script>

</body>

</html>
